<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GammingHubba | Login</title>
  
  <!-- Modern Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Shared Styles -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Add FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Specific styles for login page layout */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-box {
      width: 100%;
      max-width: 450px;
      padding: 3rem;
      text-align: center;
    }

    .login-logo {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
    }

    .login-form .input-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .login-form .primary-btn {
      width: 100%;
      margin-top: 2rem;
    }

    .login-footer {
      margin-top: 2rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .login-footer a {
      color: var(--accent-1);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }

    .login-footer a:hover {
      color: var(--accent-2);
      text-shadow: 0 0 10px rgba(129, 140, 248, 0.5);
    }
    
    .password-wrapper {
        position: relative;
    }

    .password-wrapper input {
        width: 100%;
    }
  </style>
</head>
<body>

  <!-- Decorative Background Elements -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-container">
    <div class="login-box glass-panel">
      
      <div class="login-logo logo justify-center" style="justify-content: center;">
        <i class="fa-solid fa-gamepad gradient-text"></i>
        <h1>Gamming<span class="gradient-text">Hubba</span></h1>
      </div>
      
      <p class="login-subtitle">Welcome back, Commander.</p>

      <div class="form login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="commander@nexus.dev" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
             <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          </div>
        </div>

        <!-- We just redirect to index.html for the frontend demo -->
        <button class="primary-btn" onclick="window.location.href='index.html'">
          Initialize Uplink <i class="fa-solid fa-right-to-bracket"></i>
        </button>
      </div>

      <div class="login-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>

    </div>
  </div>

</body>
</html>
